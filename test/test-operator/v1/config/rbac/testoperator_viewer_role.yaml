# This rule is not used by the project v1 itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to testolm.operator-framework.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: v1
    app.kubernetes.io/managed-by: kustomize
  name: testoperator-viewer-role
rules:
- apiGroups:
  - testolm.operator-framework.io
  resources:
  - testoperators
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - testolm.operator-framework.io
  resources:
  - testoperators/status
  verbs:
  - get
