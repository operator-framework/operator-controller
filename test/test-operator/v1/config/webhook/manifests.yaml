---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-testolm-operator-framework-io-v1-testoperator
  failurePolicy: Fail
  name: mtestoperator-v1.kb.io
  rules:
  - apiGroups:
    - testolm.operator-framework.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - testoperators
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-testolm-operator-framework-io-v1-testoperator
  failurePolicy: Fail
  name: vtestoperator-v1.kb.io
  rules:
  - apiGroups:
    - testolm.operator-framework.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - testoperators
  sideEffects: None
