# This rule is not used by the project v1 itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over testolm.operator-framework.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: v1
    app.kubernetes.io/managed-by: kustomize
  name: testoperator-admin-role
rules:
- apiGroups:
  - testolm.operator-framework.io
  resources:
  - testoperators
  verbs:
  - '*'
- apiGroups:
  - testolm.operator-framework.io
  resources:
  - testoperators/status
  verbs:
  - get
