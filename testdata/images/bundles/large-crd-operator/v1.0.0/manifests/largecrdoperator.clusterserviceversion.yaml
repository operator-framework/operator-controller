apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "largecrd.operatorframework.io/v1",
          "kind": "LargeCrdTest",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "large-crd-operator"
            },
            "name": "largecrdtest-sample"
          },
          "spec": null
        }
      ]
    capabilities: Basic Install
    createdAt: "2024-10-24T19:21:40Z"
    operators.operatorframework.io/builder: operator-sdk-v1.34.1
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
  name: large-crd-operator.v1.0.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
  owned:
    - description: LargeCrdTest is a test CRD with a large schema
      displayName: LargeCrdTest
      kind: LargeCrdTest
      name: largecrdtests.largecrd.operatorframework.io
      version: v1
  description: OLM E2E Large CRD Testing Operator
  displayName: large-crd-operator
  icon:
    - base64data: ""
      mediatype: ""
  install:
    spec:
      deployments:
        - label:
            app.kubernetes.io/component: controller
            app.kubernetes.io/name: large-crd-operator
            app.kubernetes.io/version: 1.0.0
          name: large-crd-operator
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: largecrdtest
            template:
              metadata:
                labels:
                  app: largecrdtest
              spec:
                terminationGracePeriodSeconds: 0
                volumes:
                  - name: scripts
                    configMap:
                      name: httpd-script
                      defaultMode: 0755
                containers:
                  - name: busybox-httpd-container
                    image: busybox:1.37
                    command: ["/scripts/httpd.sh"]
                    ports:
                      - containerPort: 80
                    volumeMounts:
                      - name: scripts
                        mountPath: /scripts
                        readOnly: true
                    startupProbe:
                      httpGet:
                        path: /started
                        port: 80
                      failureThreshold: 30
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: /live
                        port: 80
                      failureThreshold: 1
                      periodSeconds: 2
                    readinessProbe:
                      httpGet:
                        path: /ready
                        port: 80
                      initialDelaySeconds: 1
                      periodSeconds: 1
                    serviceAccountName: simple-bundle-manager
      clusterPermissions:
        - rules:
            - apiGroups:
                - authentication.k8s.io
              resources:
                - tokenreviews
              verbs:
                - create
            - apiGroups:
                - authorization.k8s.io
              resources:
                - subjectaccessreviews
              verbs:
                - create
          serviceAccountName: simple-bundle-manager
      permissions:
        - rules:
            - apiGroups:
                - ""
              resources:
                - configmaps
                - serviceaccounts
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - coordination.k8s.io
              resources:
                - leases
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - ""
              resources:
                - events
              verbs:
                - create
                - patch
      serviceAccountName: simple-bundle-manager
    strategy: deployment
  installModes:
    - supported: false
      type: OwnNamespace
    - supported: true
      type: SingleNamespace
    - supported: false
      type: MultiNamespace
    - supported: true
      type: AllNamespaces
  keywords:
    - registry
  links:
    - name: large-crd-operator
      url: https://large-crd-operator.domain
  maintainers:
    - email: main#large-crd-operator.domain
      name: Large CRD Operator
  maturity: beta
  provider:
    name: Large CRD Operator
    url: https://large-crd-operator.domain
  version: 1.0.0
